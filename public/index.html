<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Swap - استبدال الوجوه بالذكاء الاصطناعي</title>
    <meta name="description" content="قم بتبديل وجهك مع أي فيديو باستخدام تقنية الذكاء الاصطناعي المتقدمة">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="header">
    <div class="container">
        <nav class="nav">
            <div class="logo">
                <span>FaceSwap AI</span>
            </div>
        </nav>
    </div>
</header>

<section class="hero">
    <div class="container">
        <h1>استبدل وجهك مع أي فيديو</h1>
        <p>ذكاء اصطناعي يحولك لأي شخصية خلال ثواني</p>
    </div>
</section>

<section id="app" class="app-section">
    <div class="container">

        <!-- رفع الصورة -->
        <input type="file" id="sourceInput" accept="image/*">

        <!-- رفع الفيديو -->
        <input type="file" id="targetInput" accept="video/mp4,video/webm">

        <!-- زر التنفيذ -->
        <button onclick="performFaceSwap()">استبدال الوجوه</button>

        <!-- النتيجة -->
        <video id="resultVideo" controls></video>

    </div>
</section>

<script src="script-v2.js"></script>

</body>
</html>
